<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Journal — Participant 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="journal.css">
</head>
<body class="journal-body" data-participant="p1">
  <div class="journal-container">
    <div class="journal-topbar">
      <div>
        <h1 style="margin:0;font-size:1.4rem;">Emotion Journal</h1>
        <span class="journal-topbar-user" id="user-label"></span>
      </div>
    </div>

    <div class="journal-card" id="entry-card">
      <div class="journal-timeline-wrap">
        <button type="button" id="timeline-prev" class="journal-timeline-arrow" aria-label="Previous week">←</button>
        <div id="timeline-strip" class="journal-timeline-strip"></div>
        <button type="button" id="timeline-next" class="journal-timeline-arrow" aria-label="Next week">→</button>
      </div>

      <p id="entry-date-label" class="journal-entry-date-label"></p>
      <div id="submitted-banner" class="journal-submitted-banner" hidden></div>

      <form id="journal-form">
        <div id="questions-container"></div>
        <div id="form-message" class="journal-form-message" hidden></div>
        <div class="journal-actions">
          <button type="submit" id="submit-btn" class="journal-btn journal-btn--primary">Save entry</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
